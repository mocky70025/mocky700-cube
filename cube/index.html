<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>cube</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
    cursor: grab;
  }
  #stage.dragging { cursor: grabbing; }

  #cube {
    position: relative;
    width: 240px;
    height: 240px;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .face {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 14%;
    gap: 4%;
    box-sizing: border-box;
    background: #f4f1ea;
    border: 1px solid #f4f1ea;
    box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.08);
    backface-visibility: hidden;
    user-select: none;
  }

  .pip {
    border-radius: 50%;
    background: #1a1a1a;
    box-shadow: inset 0 2px 3px rgba(255, 255, 255, 0.15),
                inset 0 -2px 3px rgba(0, 0, 0, 0.4);
  }
  .pip.red { background: #c8242c; }

  /* phase2: アナモルフィックQR cube */
  body.phase2 .face .pip,
  body.phase2 .face .question {
    display: none;
  }
  body.phase2 .face {
    background-color: #1a1a1a;
    border-color: #1a1a1a;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    box-shadow: none;
    padding: 0;
  }
  body.phase2 .face.front  { background-image: var(--qr-image); }
  body.phase2 .face.back   { background-image: var(--noise-image-1); }
  body.phase2 .face.right  { background-image: var(--noise-image-2); }
  body.phase2 .face.left   { background-image: var(--noise-image-3); }
  body.phase2 .face.top    { background-image: var(--noise-image-4); }
  body.phase2 .face.bottom { background-image: var(--noise-image-5); }

  .face.front {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .question {
    font-size: 150px;
    font-weight: 900;
    color: #1a1a1a;
    line-height: 1;
    transform: rotate(45deg);
  }

  .pip.p1 { grid-area: 1 / 1; }
  .pip.p2 { grid-area: 1 / 2; }
  .pip.p3 { grid-area: 1 / 3; }
  .pip.p4 { grid-area: 2 / 1; }
  .pip.p5 { grid-area: 2 / 2; }
  .pip.p6 { grid-area: 2 / 3; }
  .pip.p7 { grid-area: 3 / 1; }
  .pip.p8 { grid-area: 3 / 2; }
  .pip.p9 { grid-area: 3 / 3; }

  .face.front  { transform: translateZ(120px); }
  .face.back   { transform: rotateY(180deg) translateZ(120px); }
  .face.right  { transform: rotateY( 90deg) translateZ(120px); }
  .face.left   { transform: rotateY(-90deg) translateZ(120px); }
  .face.top    { transform: rotateX( 90deg) translateZ(120px); }
  .face.bottom { transform: rotateX(-90deg) translateZ(120px); }
</style>
</head>
<body>
  <div id="stage">
    <div id="cube">
      <div class="face top">
        <span class="pip red p5"></span>
      </div>
      <div class="face front">
        <span class="question">?</span>
      </div>
      <div class="face right">
        <span class="pip p1"></span>
        <span class="pip p5"></span>
        <span class="pip p9"></span>
      </div>
      <div class="face left">
        <span class="pip p1"></span>
        <span class="pip p3"></span>
        <span class="pip p7"></span>
        <span class="pip p9"></span>
      </div>
      <div class="face back">
        <span class="pip p1"></span>
        <span class="pip p3"></span>
        <span class="pip p5"></span>
        <span class="pip p7"></span>
        <span class="pip p9"></span>
      </div>
      <div class="face bottom">
        <span class="pip p1"></span>
        <span class="pip p3"></span>
        <span class="pip p4"></span>
        <span class="pip p6"></span>
        <span class="pip p7"></span>
        <span class="pip p9"></span>
      </div>
    </div>
  </div>

<script>
  const stage = document.getElementById('stage');
  const cube  = document.getElementById('cube');

  let rotX = -20;
  let rotY = -30;
  let velX = 0;
  let velY = 0;

  let dragging = false;
  let lastX = 0;
  let lastY = 0;
  let lastT = 0;

  const SENSITIVITY = 0.4;
  const FRICTION = 0.94;
  const MIN_VEL = 0.01;

  function render() {
    cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  }

  function tick() {
    if (!dragging) {
      if (Math.abs(velX) > MIN_VEL || Math.abs(velY) > MIN_VEL) {
        rotX += velX;
        rotY += velY;
        velX *= FRICTION;
        velY *= FRICTION;
        render();
      }
    }
    requestAnimationFrame(tick);
  }

  function getPoint(e) {
    if (e.touches && e.touches.length) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    dragging = true;
    stage.classList.add('dragging');
    const p = getPoint(e);
    lastX = p.x;
    lastY = p.y;
    lastT = performance.now();
    velX = 0;
    velY = 0;
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = getPoint(e);
    const dx = p.x - lastX;
    const dy = p.y - lastY;
    const now = performance.now();
    const dt = Math.max(now - lastT, 1);

    rotY += dx * SENSITIVITY;
    rotX -= dy * SENSITIVITY;

    velY = (dx * SENSITIVITY) * (16 / dt);
    velX = -(dy * SENSITIVITY) * (16 / dt);

    lastX = p.x;
    lastY = p.y;
    lastT = now;
    render();
  }

  function onUp() {
    dragging = false;
    stage.classList.remove('dragging');
  }

  stage.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);

  stage.addEventListener('touchstart', onDown, { passive: true });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);

  render();
  tick();

  // --- URL書き換えメカニクス ---
  // /cube/      → 1ページ目
  // /cube/:     → /cube/:/ にリダイレクト
  // /cube/:/    → 2ページ目（高速回転 → QR cube）
  const DEV_PHASE2 = location.search.includes('dev=phase2');
  (function handleRoute() {
    if (DEV_PHASE2) { startPhase2(); return; }
    const path = location.pathname;
    if (/\/:$/.test(path)) {
      location.replace(path + '/' + location.search + location.hash);
      return;
    }
    if (/\/:\/$/.test(path)) {
      startPhase2();
    }
  })();

  function startPhase2() {
    velX = 14;
    velY = 38;
    setupPhase2Visuals();
    setTimeout(() => {
      document.body.classList.add('phase2');
    }, 1800);
  }

  // QRコード「!」 + ノイズ模様5面を生成して CSS 変数に渡す
  function setupPhase2Visuals() {
    QRCode.toDataURL('!', {
      errorCorrectionLevel: 'L',
      margin: 2,
      width: 480,
      color: { dark: '#f4f1ea', light: '#1a1a1a' }
    }, (err, url) => {
      if (!err) document.body.style.setProperty('--qr-image', `url(${url})`);
    });

    for (let i = 1; i <= 5; i++) {
      const noiseUrl = generateNoiseQRLike(i * 17 + 3);
      document.body.style.setProperty(`--noise-image-${i}`, `url(${noiseUrl})`);
    }
  }

  // QRっぽいランダムドット模様（同じシードで再現できるよう簡易PRNG）
  function generateNoiseQRLike(seed) {
    const size = 21;          // QR Version 1 と同じモジュール数
    const px = 480;
    const cell = px / size;
    const c = document.createElement('canvas');
    c.width = px; c.height = px;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, px, px);
    ctx.fillStyle = '#f4f1ea';
    let s = seed;
    const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        if (rand() < 0.5) ctx.fillRect(x * cell, y * cell, cell, cell);
      }
    }
    return c.toDataURL();
  }

  // --- DevTools検知（三重）---
  // 開発用 ?dev=phase2 のときは無効化（最終版では削除）
  if (!DEV_PHASE2) {
  // 検知したら https://www.google.com/search?q=cat へ強制送還
  const BANISH_URL = 'https://www.google.com/search?q=cat';
  let banished = false;
  function banish() {
    if (banished) return;
    banished = true;
    location.replace(BANISH_URL);
  }

  // A. resize差分検知（dockedなDevTools）
  function checkResize() {
    const wDiff = window.outerWidth  - window.innerWidth;
    const hDiff = window.outerHeight - window.innerHeight;
    if (wDiff > 200 || hDiff > 200) banish();
  }
  setInterval(checkResize, 800);
  window.addEventListener('resize', checkResize);

  // B. debugger trip（DevTools開時にpauseで時間差が出る）
  function checkDebugger() {
    const start = performance.now();
    // eslint-disable-next-line no-debugger
    debugger;
    if (performance.now() - start > 100) banish();
  }
  setInterval(checkDebugger, 1500);

  // C. console getter trap（Console/Elements展開時に発火）
  const trap = {};
  Object.defineProperty(trap, 'id', {
    get() { banish(); return ''; }
  });
  setInterval(() => {
    console.log('%c', '', trap);
    console.clear();
  }, 1500);

  // 初回チェック
  checkResize();
  } // end of DevTools detection guard
</script>
</body>
</html>
